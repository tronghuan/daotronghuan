<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <rect x="2" y="4" width="62" height="62" rx="13" fill="rgba(0,0,0,0.25)"/>

  <!-- Main background -->
  <rect width="62" height="62" rx="12" fill="url(#bg)"/>

  <!-- Top highlight -->
  <rect x="8" y="6" width="30" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>

  <!-- Border -->
  <rect x="1" y="1" width="60" height="60" rx="11"
        fill="none" stroke="rgba(147,197,253,0.4)" stroke-width="1.5"/>

  <!-- DTH text -->
  <text
    x="31"
    y="42"
    font-family="Arial, Helvetica, sans-serif"
    font-size="24"
    font-weight="bold"
    fill="white"
    text-anchor="middle"
    letter-spacing="1.5"
  >DTH</text>
</svg>
